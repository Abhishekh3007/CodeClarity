version: "3.9"

services:

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: codeclarity
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: codeclarity
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codeclarity"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ../../services/auth-service
    environment:
      DATABASE_URL: postgresql://codeclarity:secret@postgres:5432/codeclarity
      JWT_SECRET: change_this_secret_in_production
      JWT_EXPIRES_IN: 7d
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

  repo-service:
    build:
      context: ../../services/repo-service
    environment:
      DATABASE_URL: postgresql://codeclarity:secret@postgres:5432/codeclarity
      JWT_SECRET: change_this_secret_in_production
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GITHUB_CALLBACK_URL: http://localhost:3002/auth/github/callback
      PORT: 3002
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy

  review-service:
    build:
      context: ../../services/review-service
    environment:
      DATABASE_URL: postgresql://codeclarity:secret@postgres:5432/codeclarity
      JWT_SECRET: change_this_secret_in_production
      REDIS_URL: redis://redis:6379
      PORT: 3003
    ports:
      - "3003:3003"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-service:
    build:
      context: ../../services/worker-service
    environment:
      DATABASE_URL: postgresql://codeclarity:secret@postgres:5432/codeclarity
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      PORT: 3004
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ../../frontend
    ports:
      - "5173:80"
    depends_on:
      - auth-service
      - repo-service
      - review-service

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  pg_data:
  redis_data:
